    <nav>

    <main>
        <section>
            <h2>Reach Out to Us</h2>
            <p>
                To look into a better tomorrow...
            </p>
           
            <div class="image-flip">

            <img src="../images/purpleFlower.JPG" alt="Contact GreenTech Solutions" class="front-image">

            <form id="contactForm">
                <input type="text" id="name" placeholder="Your Name" required><br><br>
                <input type="email" id="email" placeholder="Your Email" required><br><br>
                <textarea id="messageInput" placeholder="Your Message" required></textarea><br><br>

                <button type="submit">Send Message</button>
            </form>

            <p id="formMessage"></p>
        </section>
